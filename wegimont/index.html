<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Photos de la galerie</title>

<style>
body{
  background-color:black;
  color: #fdeb88;
  font-family:Arial;
  text-align:center;
}

h1{
  color: #fdeb88;
  margin-top: 20px;
}

.logo{
  width: 280px;
  margin: 20px;
}

.galerie{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding: 20px;
}

.galerie img{
  width: 100%;
  border-radius: 10px;
  transition: 0.3s;
  cursor:pointer;
}

.galerie img:hover{
  transform: scale(1.05);
}

/* --- Lightbox (agrandissement photo) --- */
.lightbox{
  display:none;
  position:fixed;
  z-index: 999;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.lightbox img{
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

.lightbox.actif{
  display:flex;
}

.ferme{
  position:absolute;
  top: 20px;
  right: 30px;
  font-size: 40px;
  color:white;
  cursor:pointer;
}
</style>

</head>
<body>

<img src="logo.jpg" class="logo">

<h1>Domaine de Wégimont</h1>

<div class="galerie">

<img src="1.jpeg" onclick="ouvrirImage(this)">
<img src="2.jpeg" onclick="ouvrirImage(this)">
<img src="3.jpeg" onclick="ouvrirImage(this)">
<img src="4.jpeg" onclick="ouvrirImage(this)">
<img src="5.jpeg" onclick="ouvrirImage(this)">

</div>

<!-- Fenêtre agrandie -->
<div class="lightbox" id="lightbox">
  <span class="ferme" onclick="fermerImage()">&times;</span>
  <img id="image-agrandie" src="">
</div>

<script>
function ouvrirImage(element) {
  document.getElementById("lightbox").classList.add("actif");
  document.getElementById("image-agrandie").src = element.src;
}

function fermerImage() {
  document.getElementById("lightbox").classList.remove("actif");
}
</script>

</body>
</html>
