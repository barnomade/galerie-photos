<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Événement, cour d'un château</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #000000;
    color: white;
    margin: 0;
    padding: 0;
  }

  .logo {
    max-width: 150px;
    margin-top: 20px;
  }

  h1 {
    color: white;
  }

  .bouton-retour {
    display: inline-block;
    margin: 20px;
    padding: 10px 20px;
    background-color: #fdeb88;
    color: black;
    text-decoration: none;
    border-radius: 5px;
    font-family: Arial, sans-serif;
    font-weight: bold;
  }

  .galerie {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    padding: 20px;
  }

  .galerie img {
    width: 150px;
    height: 150px;
    object-fit: cover;
    cursor: pointer;
    border-radius: 8px;
    transition: transform 0.2s;
  }

  .galerie img:hover {
    transform: scale(1.05);
  }

  .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.95);
    text-align: center;
  }

  .modal img {
    max-width: 90%;
    max-height: 80%;
    margin-top: 50px;
  }

  .fermer {
    position: absolute;
    top: 20px;
    right: 40px;
    font-size: 40px;
    color: white;
    cursor: pointer;
  }
</style>
</head>
<body>

<img src="logo.jpg" class="logo">

<h1>Événement, cour d'un château</h1>

<a href="METS_ICI_URL_SYSTEME_IO" class="bouton-retour">← Retour au site</a>

<div class="galerie">
  <img src="1.jpeg" onclick="ouvrirImage(this)">
  <img src="2.jpeg" onclick="ouvrirImage(this)">
  <img src="3.jpeg" onclick="ouvrirImage(this)">
  <img src="4.jpeg" onclick="ouvrirImage(this)">
  <img src="5.jpeg" onclick="ouvrirImage(this)">
  <img src="6.jpeg" onclick="ouvrirImage(this)">
  <img src="7.jpeg" onclick="ouvrirImage(this)">
  <img src="8.jpeg" onclick="ouvrirImage(this)">
  <img src="9.jpeg" onclick="ouvrirImage(this)">
  <img src="10.jpeg" onclick="ouvrirImage(this)">
  <img src="11.jpeg" onclick="ouvrirImage(this)">
  <img src="12.jpeg" onclick="ouvrirImage(this)">
  <img src="13.jpeg" onclick="ouvrirImage(this)">
  <img src="14.jpeg" onclick="ouvrirImage(this)">
  <img src="15.jpeg" onclick="ouvrirImage(this)">
  <img src="16.jpeg" onclick="ouvrirImage(this)">
  <img src="17.jpeg" onclick="ouvrirImage(this)">
  <img src="18.jpeg" onclick="ouvrirImage(this)">
  <img src="19.jpeg" onclick="ouvrirImage(this)">
</div>

<div class="modal" id="monModal">
  <span class="fermer" onclick="fermerImage()">&times;</span>
  <img id="imageAffichee" src="">
</div>

<script>
function ouvrirImage(element) {
  document.getElementById("monModal").style.display = "block";
  document.getElementById("imageAffichee").src = element.src;
}

function fermerImage() {
  document.getElementById("monModal").style.display = "none";
}
</script>

</body>
</html>
