
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Galerie photos</title>

<style>
body {
  background: black;
  color: #fdeb88;
  font-family: Arial;
  text-align: center;
}

h1 {
  color: #fdeb88;
  margin-top: 20px;
}

.logo {
  width: 150px;
  margin: 20px;
}

.galerie {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding: 20px;
}

.galerie img {
  width: 100%;
  border-radius: 10px;
  transition: 0.3s;
}

.galerie img:hover {
  transform: scale(1.05);
}
</style>

</head>
<body>

<img src="logo.jpg" class="logo">

<h1>Evénement, cour d'un château</h1>

<div class="galerie">

<img src="1.jpeg">
<img src="2.jpeg">
<img src="3.jpeg">
<img src="4.jpeg">
<img src="5.jpeg">
<img src="6.jpeg">
<img src="7.jpeg">
<img src="8.jpeg">
<img src="9.jpeg">
<img src="10.jpeg">
<img src="11.jpeg">
<img src="12.jpeg">
<img src="13.jpeg">
<img src="14.jpeg">
<img src="15.jpeg">
<img src="16.jpeg">
<img src="17.jpeg">
<img src="18.jpeg">

</div>

</body>
</html>
